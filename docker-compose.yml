version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: shaadi_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shaadi_backend
    restart: unless-stopped
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      DATABASE_NAME: shaadi_brain
      JWT_SECRET: change-me-in-production
      JWT_EXPIRE_DAYS: 30
    ports:
      - "8000:8000"
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shaadi_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
